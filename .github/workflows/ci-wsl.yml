name: Weekly cron (WSL)

on:
  schedule:
    # when is a good time?
    - cron: '0 12 * * SAT'
  pull_request:

#Reduces GH Action duplication:
# Cancels the previous pipeline for this ref it is still running
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: windows-latest
    if: (github.repository == 'sherpa/sherpa' && (github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'CI wsl')))

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      # As we do not include an I/O backend it is not worth checking out the data submodule.
      #
      # with:
      #   submodules: 'True'

    # How much of this do we need?
    - name: Setup WSL
      uses: vedantmgoyal9/setup-wsl2@main

    - name: Setup apt
      shell: wsl-run {0} # add this to run the commands inside linux
      run: |
        apt update
        apt upgrade -y
        apt-get install -q -y git \
                              g++ \
                              gfortran \
                              flex \
                              bison \
                              make \
                              pkg-config \
                              python3 \
                              python3-dev \
                              python3-configobj \
                              python3-numpy \
                              python3-venv


    # Do not install any extra packages for now
    - name: Build and test
      shell: wsl-run {0}
      run: |
        python3 -m venv --system-site-packages tests
        source tests/bin/activate

        pip3 install -e .[test]
        python3 -m pytest
