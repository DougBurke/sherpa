name: Weekly cron (arch)

on:
  schedule:
    # when is a good time?
    - cron: '0 23 * * SUN'
  pull_request:
    # We also want this workflow triggered if the 'CI arch' label is added
    # or present when PR is updated
    types: [synchronize, labeled]

#Reduces GH Action duplication:
# Cancels the previous pipeline for this ref it is still running
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    if: (github.repository == 'sherpa/sherpa' && (github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'CI arch')))

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
          # - arch: ppc64le  this is very slow

          # We currently do not have any user requests for this
          # architecture.
          #
          # - arch: s390x

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      # As we do not include an I/O backend it is not worth checking out the data submodule.
      #
      # with:
      #   submodules: 'True'

    # ubuntu_latest does not provide g++ < 15.0 so pick an older version
    - name: Build and test
      uses: uraimo/run-on-arch-action@v3
      with:
        arch: ${{ matrix.arch }}
        # use the latest LTS version
        distro: ubuntu24.04

        shell: /bin/bash

        # Based on AstroPy
        install: |
          apt-get update -q -y
          apt-get install -q -y \
                                g++ \
                                flex \
                                bison \
                                make \
                                file \
                                libfftw3-dev \
                                pkg-config \
                                python3 \
                                python3-dev \
                                python3-configobj \
                                python3-numpy \
                                python3-venv

        # Follow AstroPy for now and do not install any external packages
        # (I/O, plotting, or DS9).
        #
        run: |
          python3 -m venv --system-site-packages tests
          source tests/bin/activate

          # without this we get configure errors when building fftw and I don't know why
          # (this adds the --disable-dependency-tracking option). A google suggests it
          # could be a make vs gmake issue but we can't easily change this (and it may
          # not be the actual problem).
          #
          sed -i.orig "s|#configure=None|configure=--disable-maintainer-mode --enable-stuberrorlib --disable-shared --enable-shared=libgrp,stklib --disable-dependency-tracking|" setup.cfg

          # use the apt instaled fftw3
          fftw3_inc_path=`pkg-config --cflags-only-I fftw3 | awk '{print(substr($0, 3));}' -`
          fftw3_libs_path=`pkg-config --libs-only-L fftw3 | awk '{print(substr($0, 3));}' -`
          fftw3_name=`pkg-config --libs-only-l fftw3 | awk '{print(substr($0, 3));}' -`
          # Edit the configuration
          sed -i.orig "s|#fftw=local|fftw=local|" setup.cfg
          sed -i.orig "s|#fftw_include_dirs=build/include|fftw_include_dirs=${fftw3_inc_path}|" setup.cfg
          sed -i.orig "s|#fftw_lib_dirs=build/lib|fftw_lib_dirs=${fftw3_libs_path}|" setup.cfg
          sed -i.orig "s|#fftw_libraries=fftw3|fftw_libraries=${fftw3_name}|" setup.cfg
          #
          echo "* START setup.cfg"
          grep fftw setup.cfg
          echo "* END   setup.cfg"

          pip3 install -e .[test]
          python3 -m pytest
